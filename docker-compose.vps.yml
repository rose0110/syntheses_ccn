# ============================================================
# docker-compose.vps.yml — Déploiement Production (VPS)
# ============================================================
#
# WORKFLOW :
#   1. (Local)  python export_db.py && git add database.sql.gz && git push
#   2. (VPS)    git pull && mkdir -p data output
#   3. (VPS)    docker-compose -f docker-compose.vps.yml up -d --build
#
# L'entrypoint restaure elnet.db depuis database.sql.gz au 1er démarrage.
# Le nginx SYSTÈME du VPS redirige le trafic vers le port 8000.
#
# Optionnel — Lancer avec nginx Docker (si pas de nginx système) :
#   docker-compose -f docker-compose.vps.yml --profile nginx up -d --build
#
# Scraper :  docker-compose -f docker-compose.vps.yml --profile scraping run --rm scraper
# Importer : docker-compose -f docker-compose.vps.yml --profile import run --rm importer
# ============================================================

services:

  # ──────────────────────────────────────────────────────────
  # API FastAPI — Production (port 8000, géré par nginx système)
  # ──────────────────────────────────────────────────────────
  api:
    build:
      context: .
      target: api
    container_name: elnet-api
    restart: unless-stopped
    ports:
      - "8000:8000" # Le nginx système forward vers ce port
    volumes:
      - ./data:/app/data # elnet.db restauré ici au 1er boot
      - ./output:/app/output
      - ./conventions_list.json:/app/conventions_list.json:ro
    environment:
      - DATABASE_URL=sqlite:////app/data/elnet.db
      - API_KEY=${API_KEY}
      - ELNET_USERNAME=${ELNET_USERNAME}
      - ELNET_PASSWORD=${ELNET_PASSWORD}
    env_file:
      - .env
    command: uvicorn api:app --host 0.0.0.0 --port 8000 --workers 2
    healthcheck:
      test: [ "CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/')\" 2>&1 || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  # ──────────────────────────────────────────────────────────
  # NGINX Docker (OPTIONNEL — seulement si pas de nginx système)
  # docker-compose ... --profile nginx up -d
  # ──────────────────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: elnet-nginx
    restart: unless-stopped
    profiles: [ "nginx" ] # Désactivé par défaut
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - certbot-www:/var/www/certbot:ro
      - certbot-certs:/etc/letsencrypt:ro
    depends_on:
      - api
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"

  certbot:
    image: certbot/certbot:latest
    container_name: elnet-certbot
    profiles: [ "nginx" ] # Désactivé par défaut
    volumes:
      - certbot-www:/var/www/certbot
      - certbot-certs:/etc/letsencrypt
    entrypoint: /bin/sh -c "trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot --quiet; sleep 12h & wait $${!}; done"

  # ──────────────────────────────────────────────────────────
  # SCRAPER — Tâche ponctuelle
  # ──────────────────────────────────────────────────────────
  scraper:
    build:
      context: .
      target: scraper
    container_name: elnet-scraper
    profiles: [ "scraping" ]
    volumes:
      - ./data:/app/data
      - ./output:/app/output
      - ./conventions_list.json:/app/conventions_list.json:ro
    environment:
      - DATABASE_URL=sqlite:////app/data/elnet.db
      - ELNET_USERNAME=${ELNET_USERNAME}
      - ELNET_PASSWORD=${ELNET_PASSWORD}
      - API_KEY=${API_KEY}
    env_file:
      - .env
    command: python main.py --all

  # ──────────────────────────────────────────────────────────
  # IMPORTER — Import JSON → SQLite
  # ──────────────────────────────────────────────────────────
  importer:
    build:
      context: .
      target: api
    container_name: elnet-importer
    profiles: [ "import" ]
    volumes:
      - ./data:/app/data
      - ./output:/app/output
    environment:
      - DATABASE_URL=sqlite:////app/data/elnet.db
    env_file:
      - .env
    command: python import_to_db.py --generate-integrales

volumes:
  certbot-www:
    driver: local
  certbot-certs:
    driver: local
