server {
    listen 80;
    server_name TON_DOMAINE.com www.TON_DOMAINE.com;

    # Challenge Let's Encrypt (renouvellement SSL)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirige tout le reste vers HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name TON_DOMAINE.com www.TON_DOMAINE.com;

    # Certificats SSL (générés par Certbot)
    ssl_certificate     /etc/letsencrypt/live/TON_DOMAINE.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/TON_DOMAINE.com/privkey.pem;

    # Sécurité SSL moderne
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # Headers de sécurité
    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection "1; mode=block";
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Limite la taille des requêtes
    client_max_body_size 5M;

    # Proxy vers l'API FastAPI
    location / {
        proxy_pass         http://api:8000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_connect_timeout 10s;
    }
}
